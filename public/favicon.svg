<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#090a0f"/>
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" fill-opacity="0.08"/>
  <circle cx="50" cy="50" r="48" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Outer ambient glow ring -->
  <circle cx="50" cy="50" r="44" stroke="url(#grad2)" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Neural S-path — upper arc -->
  <path d="M 62 28 C 62 28 72 28 72 38 C 72 48 50 48 50 48 C 50 48 28 48 28 58 C 28 68 38 72 38 72"
        stroke="url(#grad1)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Neural S-path — lower arc -->
  <path d="M 38 72 C 38 72 28 72 28 62"
        stroke="url(#grad2)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <path d="M 62 28 C 62 28 72 28 72 38"
        stroke="url(#grad1)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Node dots on the S — neural network nodes -->
  <circle cx="62" cy="28" r="4.5" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="50" cy="48" r="4.5" fill="url(#grad2)" filter="url(#glow)"/>
  <circle cx="38" cy="68" r="4.5" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Connecting neural sparks / branches -->
  <line x1="62" y1="28" x2="72" y2="22" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="62" y1="28" x2="70" y2="33" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="72" cy="22" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="70" cy="33" r="2" fill="#6366f1" opacity="0.8"/>

  <line x1="50" y1="48" x2="56" y2="40" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="48" x2="44" y2="56" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="56" cy="40" r="2" fill="#06b6d4" opacity="0.8"/>
  <circle cx="44" cy="56" r="2" fill="#6366f1" opacity="0.8"/>

  <line x1="38" y1="68" x2="30" y2="62" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="68" x2="28" y2="74" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="30" cy="62" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="28" cy="74" r="2" fill="#06b6d4" opacity="0.8"/>
</svg>
