name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Synthegnotica ${{ github.ref_name }}'
          releaseBody: |
            ## Synthegnotica ${{ github.ref_name }}

            AI-powered Open Source IDE — free cloud AI, no API keys, no subscriptions.

            ### Download
            | File | Description |
            |------|-------------|
            | `*-setup.exe` | Windows installer (recommended) |
            | `*.msi` | Windows MSI package |

            ### What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Requirements
            - Windows 10/11 x64
            - Internet connection (AI is cloud-based via Puter.js)
          releaseDraft: false
          prerelease: false
